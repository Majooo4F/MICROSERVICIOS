server:
  port: 8080

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: authorization-server
              uri: lb://AUTHORIZATION-SERVER
              predicates:
                - Path=/register,/oauth2/**,/login,/.well-known/**,/h2-console/**
              filters:
                - StripPrefix=0

            - id: ms-comercial
              uri: lb://MS-COMERCIAL
              predicates:
                - Path=/api/**
              filters:
                - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/