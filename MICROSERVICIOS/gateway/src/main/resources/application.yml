server:
  port: 8090

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ms-a
              uri: lb://ms-a
              predicates:
                - Path=/api/entity-a/**
              filters:
                - StripPrefix=0

            - id: ms-b
              uri: lb://ms-b
              predicates:
                - Path=/api/entity-b/**
              filters:
                - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/